<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="center">

<h2>تسجيل الدخول</h2>

<!-- الهوية: email / phone / username -->
<input 
id="identifierInput" 
placeholder="ايميل / رقم جوال / اسم مستخدم"
autocomplete="username"
>

<input 
type="password" 
id="passwordInput" 
placeholder="ادخل كلمة المرور"
autocomplete="current-password"
>

<p id="errorMsg" style="color:red;display:none">
بيانات الدخول غير صحيحة
</p>

<button onclick="loginUser()">دخول</button>

</div>

<script src="app.js"></script>

<script>

/* تعبئة آخر اسم مستخدم استخدمه */
const savedIdentifier = localStorage.getItem("tempIdentifier")

if(savedIdentifier){
document.getElementById("identifierInput").value = savedIdentifier
}

</script>

</body>
</html>
